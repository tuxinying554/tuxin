<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>途辛汽车美容 · 官方导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(165deg, #f0f5fb 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 440px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px rgba(0,40,80,0.4), 0 10px 20px -8px rgba(0,0,0,0.2);
            padding: 32px 24px 36px 24px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .shop-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .shop-name {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(145deg, #0b2b4a, #1d456b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .shop-badge {
            display: inline-block;
            background: #d9e6f2;
            color: #1e4a76;
            font-size: 16px;
            font-weight: 600;
            padding: 8px 24px;
            border-radius: 60px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 4px 10px rgba(0,30,60,0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 30px 0 20px 0;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 16px;
            border-radius: 100px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }
        .nav-btn:active {
            transform: scale(0.97);
            box-shadow: 0 8px 15px -6px rgba(0,0,0,0.3);
        }
        .nav-btn i {
            font-size: 26px;
            font-style: normal;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }
        .amap-btn {
            background: #1B6AFF;
            background: linear-gradient(135deg, #1B6AFF, #0F4ABF);
        }
        .qqmap-btn {
            background: #12B7F5;
            background: linear-gradient(135deg, #12B7F5, #0F8FC9);
        }
        .bdmap-btn {
            background: #29D0D3;
            background: linear-gradient(135deg, #29D0D3, #1DA9AD);
        }
        .footer-note {
            margin-top: 30px;
            text-align: center;
            color: #6b85a0;
            font-size: 15px;
            border-top: 1px solid #d3e0ec;
            padding-top: 25px;
        }
        .tip {
            background: #eef4fa;
            border-radius: 60px;
            padding: 14px 18px;
            color: #1d405e;
            font-size: 15px;
            display: inline-block;
            margin-top: 8px;
        }
        .emoji-large {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="shop-header">
            <div class="shop-name">途辛汽车美容</div>
            <div class="shop-badge">
                <span class="emoji-large">📍</span> 官方导航 · 一键直达
            </div>
        </div>

        <!-- 三个纯分享链接按钮（你给的链接） -->
        <div class="nav-container">
            <!-- 高德地图 - 使用你的分享链接 -->
            <a class="nav-btn amap-btn" 
               href="https://surl.amap.com/TjKQMuk4HT" 
               target="_blank" 
               rel="noopener noreferrer">
                <i>🗺️</i>
                <span>高德地图</span>
                <i>→</i>
            </a>

            <!-- 腾讯地图 - 使用你的分享链接 -->
            <a class="nav-btn qqmap-btn" 
               href="https://mmapgwh.map.qq.com/shortlink/short?l=_affc85625bc234bf115728bde2e21b2c" 
               target="_blank" 
               rel="noopener noreferrer">
                <i>🧭</i>
                <span>腾讯地图</span>
                <i>→</i>
            </a>

            <!-- 百度地图 - 使用你的分享链接 -->
            <a class="nav-btn bdmap-btn" 
               href="https://j.map.baidu.com/31/aNYk" 
               target="_blank" 
               rel="noopener noreferrer">
                <i>🌐</i>
                <span>百度地图</span>
                <i>→</i>
            </a>
        </div>

        <!-- 简洁说明 -->
        <div class="footer-note">
            <div class="tip">
                ⚡ 点击即可打开 · 自动唤起App或使用网页版
            </div>
            <div style="margin-top: 16px; color: #8ca0b8;">
                途辛汽车美容 · 专属导航码
            </div>
        </div>
    </div>

    <!-- 非常轻量的统计（可选，只是为了查看点击情况，你可以删除） -->
    <script>
        // 纯展示：在控制台输出一下当前使用的链接（方便你确认）
        console.log('当前导航页面使用你的分享链接：');
        console.log('高德: https://surl.amap.com/TjKQMuk4HT');
        console.log('腾讯: https://mmapgwh.map.qq.com/shortlink/short?l=_affc85625bc234bf115728bde2e21b2c');
        console.log('百度: https://j.map.baidu.com/31/aNYk');
    </script>
</body>
</html>
